<!-- Parallax JS -->
<script>
  (function() {
    var heroBg = document.querySelector('.hero-02-parallax');
    if (heroBg) {
      window.addEventListener('scroll', function() {
        var scrolled = window.pageYOffset;
        heroBg.style.transform = 'translateY(' + (scrolled * 0.35) + 'px)';
      }, { passive: true });
    }
  })();
</script>
